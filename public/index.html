<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>5AM Check-in - Đăng nhập</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="brand">
      <div class="brand-logo">5AM</div>
      <h1>5AM Check-in</h1>
      <p>Dậy sớm - Thành công sớm</p>
    </div>

    <div class="auth-card">
      <div class="tabs">
        <button class="tab active" data-tab="login">Đăng nhập</button>
        <button class="tab" data-tab="register">Đăng ký</button>
      </div>

      <!-- LOGIN FORM -->
      <form id="login-form" class="auth-form active">
        <div class="form-group">
          <label>Tên đăng nhập</label>
          <input type="text" name="username" autocomplete="username" required>
          <div class="field-error"></div>
        </div>
        <div class="form-group">
          <label>Mật khẩu</label>
          <div class="password-wrap">
            <input type="password" name="password" autocomplete="current-password" required>
            <button type="button" class="toggle-pwd" tabindex="-1">👁</button>
          </div>
          <div class="field-error"></div>
        </div>
        <div id="login-message" class="message"></div>
        <button type="submit" class="btn-primary">Đăng nhập</button>
      </form>

      <!-- REGISTER FORM -->
      <form id="register-form" class="auth-form">
        <div class="form-group">
          <label>Họ và tên *</label>
          <input type="text" name="full_name" required>
          <div class="field-error"></div>
        </div>
        <div class="form-group">
          <label>Số điện thoại (Zalo) *</label>
          <input type="text" name="phone" placeholder="0xxxxxxxxx" maxlength="10" required>
          <div class="field-hint">10 chữ số, bắt đầu bằng số 0</div>
          <div class="field-error"></div>
        </div>
        <div class="form-group">
          <label>Email *</label>
          <input type="email" name="email" placeholder="email@gmail.com" required>
          <div class="field-hint">Chỉ chấp nhận @gmail.com hoặc @<span id="company-domain">company</span>.com</div>
          <div class="field-error"></div>
        </div>
        <div class="form-group">
          <label>Tên đăng nhập *</label>
          <input type="text" name="username" required>
          <div class="field-hint">Viết liền không dấu, chữ thường và số</div>
          <div class="field-error"></div>
        </div>
        <div class="form-group">
          <label>Mật khẩu *</label>
          <div class="password-wrap">
            <input type="password" name="password" required>
            <button type="button" class="toggle-pwd" tabindex="-1">👁</button>
          </div>
          <div class="field-hint">Tối thiểu 8 ký tự, có IN HOA, thường, số, ký tự đặc biệt</div>
          <div class="field-error"></div>
        </div>
        <div class="form-group">
          <label>Nhập lại mật khẩu *</label>
          <div class="password-wrap">
            <input type="password" name="confirm_password" required>
            <button type="button" class="toggle-pwd" tabindex="-1">👁</button>
          </div>
          <div class="field-error"></div>
        </div>
        <div id="register-message" class="message"></div>
        <button type="submit" class="btn-primary">Tạo tài khoản</button>
      </form>
    </div>

    <div class="footer-note">© 2026 5AM Check-in</div>
  </div>

  <script src="/js/auth.js"></script>
</body>
</html>
