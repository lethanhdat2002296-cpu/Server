<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Gửi biên lai thanh toán - 5AM</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="auth-page">
  <div class="auth-container" style="max-width:520px;">
    <div class="brand">
      <div class="brand-logo">5AM</div>
      <h1>Gửi biên lai thanh toán</h1>
      <p>Nhập họ tên của bạn để bắt đầu</p>
    </div>

    <div class="auth-card">
      <form id="pay-form" class="auth-form active">
        <!-- Tên + gợi ý -->
        <div class="form-group" style="position:relative;">
          <label>Họ và tên *</label>
          <input type="text" name="full_name" autocomplete="off" placeholder="Gõ tên để tìm..." required>
          <div id="name-suggest" class="suggest-box"></div>
          <div class="field-hint">Gõ tên rồi <b>bấm chọn đúng tên của bạn</b> trong danh sách gợi ý để tự điền thông tin</div>
          <div class="field-error"></div>
        </div>

        <!-- Thông tin (hiện sau khi chọn / có thể sửa) -->
        <div class="form-row">
          <div class="form-group">
            <label>Số điện thoại *</label>
            <input type="text" name="phone" maxlength="10" placeholder="0xxxxxxxxx" required>
            <div class="field-error"></div>
          </div>
          <div class="form-group">
            <label>Email *</label>
            <input type="email" name="email" placeholder="email@gmail.com" required>
            <div class="field-hint">Email xác nhận sẽ gửi về đây</div>
            <div class="field-error"></div>
          </div>
        </div>

        <!-- Ảnh biên lai -->
        <div class="form-group">
          <label>Ảnh biên lai chuyển khoản *</label>
          <div id="pay-drop" class="drop-zone">
            <input type="file" id="pay-image" accept="image/*" hidden>
            <label for="pay-image" style="cursor:pointer;display:block;">
              <div style="font-size:42px;margin-bottom:8px;">📷</div>
              <div style="font-weight:600;margin-bottom:4px;">Chọn ảnh biên lai</div>
              <div style="font-size:12px;color:#7f8c8d;">JPG, PNG. Tối đa 5MB. Tự nén nếu cần.</div>
            </label>
          </div>
          <div id="pay-preview-wrap" style="display:none;margin-top:14px;">
            <img id="pay-preview" style="max-width:100%;max-height:320px;border-radius:10px;border:1px solid #ecf0f1;">
            <div style="margin-top:8px;text-align:right;">
              <button type="button" class="btn-secondary" id="pay-clear" style="width:auto;padding:6px 16px;">Đổi ảnh</button>
            </div>
          </div>
          <div id="pay-ocr-status" style="margin-top:10px;font-size:13px;"></div>
          <div class="field-error"></div>
        </div>

        <div id="pay-message" class="message"></div>
        <button type="submit" class="btn-primary" id="pay-submit" disabled>Gửi biên lai</button>
      </form>

      <!-- Trạng thái thành công -->
      <div id="pay-success" style="display:none;padding:30px;text-align:center;">
        <div style="font-size:60px;margin-bottom:10px;">✓</div>
        <h2 style="color:#00b894;margin-bottom:8px;">Đã gửi thành công!</h2>
        <p id="pay-success-msg" style="color:#555;font-size:14px;line-height:1.6;"></p>
        <button class="btn-secondary" id="pay-again" style="margin-top:20px;max-width:220px;display:inline-block;width:auto;">Gửi biên lai khác</button>
      </div>
    </div>

    <div class="footer-note">© 2026 5AM Check-in</div>
  </div>

  <script src="/js/payment.js"></script>
</body>
</html>
